<html>
<head>
<title>Reena Website</title>

 <style>

body{
margin:0;
font-family:Cambria;
background-color:#f2f2f2;
}

/* Header */
header{
background-color:purple;
color:white;
text-align:center;
padding:20px;
}


/* Navbar */
nav{
background-color:black;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
font-size:18px;
}

nav a:hover{
background-color:white;
color:clack;
padding:5px;
border-radius:5px;
}




/* Button */
button{
background-color:blue;
color:white;
padding:8px 15px;
border:none;
border-radius:5px;
}


button:hover{
background-color:orange;
}



</style>

 <script>

  //popup function 
  function showMsg(){
   alert(Welcome Reena");
  }

  //Show Home
  function showHome(){
   document.getElementById("home").style.display="block";
   document.getElementBy Id("About").style.display="none";
   document.getElementBy Id("contact").style.display="none";
  }

 //Show About
  function showAbout(){
   document.getElementById("home").style.display="none";
   document.getElementById("about").style.display="block";
   document.getElementBy Id("contact").style.display="none";
  }

  
    //Show Contact
  function showContact(){
   document.getElementById("home").style.display="none";
   document.getElementBy Id("About").style.display="none";
   document.getElementBy Id("contact").style.display="block";
  }
 </script>
</head>

<body>

<header>
<h1>Reena Website</h1>
<p> Full Website  Project with the combination of HTML+CSS+JS</p>
</header>

<nav>
<a onclick="showHome()">Home</a>
<a onclick="showAbout()">About</a>
<a onclick="showContact()">Contact</a>
</nav>
 
<hr>

<!--Home Section-->
 <div id="home">
  
  <h2>Home Page</h2>
  <p>This is Home Page</p>
  <button onclick="showMsg()">Click Me
  </button>
 </div>


<!--About Section-->
 <div id="about">
  
  <h2>About Page</h2>
  <p>This is my 2nd about Page</p>
  <button onclick="showMsg()">Click Me
  </button>
 </div>

<!--Contact Section-->
 <div id="contact">
  style="display:none;">
  
  <h2>Contact Page</h2>
  <p>This is contact Page</p>
  
  <button onclick="showHome()">Go Back 
   Home</button>
 </div>
</body>
</html>
